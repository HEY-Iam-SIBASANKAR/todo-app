<div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="col-md-5 col-lg-4">
        <div class="card shadow-lg border-0 rounded-4">
            <div class="card-body p-4">
                <h3 class="text-center mb-4">Create Account</h3>

                <div class="mb-3">
                    <label class="form-label">User Name</label>
                    <input type="text" id="txtUserName" class="form-control rounded-3">
                    <small id="lblUserError" class="form-text"></small>
                </div>

                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" id="txtPassword" class="form-control rounded-3">
                </div>

                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" id="txtEmail" class="form-control rounded-3">
                </div>

                <button id="btnRegister" class="btn btn-primary w-100 rounded-pill mt-2">
                    Register
                </button>

                <p class="text-center mt-3 mb-0">
                    <button id="home-login-button" class="btn btn-link text-decoration-none">
                        Already have an account?
                    </button>
                </p>
            </div>
        </div>
    </div>
</div>
